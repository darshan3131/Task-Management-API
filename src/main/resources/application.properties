spring.application.name=taskapi

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Database ─────────────────────────────────────────────────────────────────
# Railway injects DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD automatically.
# The values after the colon (:) are local development fallbacks.
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/taskdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:my-secret-pw}

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Set JWT_SECRET as an environment variable — never commit the real secret.
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
# 86400000 = 24 hours in milliseconds
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ─── Actuator ─────────────────────────────────────────────────────────────────
# Expose only health and info — never expose all endpoints in production
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
